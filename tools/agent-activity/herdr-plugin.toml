id = "local.agent-icons"
name = "Agent Activity"
version = "2.1.0"
description = "Native Herdr Agent identity, scope, linked-worktree context, status, and elapsed time."
min_herdr_version = "0.7.4"
platforms = ["linux"]

[[actions]]
id = "setup"
title = "Agent Activity: configure and refresh"
command = ["bash", "scripts/setup.sh"]

[[actions]]
id = "refresh"
title = "Agent Activity: refresh sidebar metadata"
command = ["python3", "scripts/refresh.py"]

[[events]]
on = "workspace.created"
command = ["python3", "scripts/refresh.py"]

[[events]]
on = "workspace.closed"
command = ["python3", "scripts/refresh.py"]

[[events]]
on = "workspace.renamed"
command = ["python3", "scripts/refresh.py"]

[[events]]
on = "worktree.created"
command = ["python3", "scripts/refresh.py"]

[[events]]
on = "worktree.opened"
command = ["python3", "scripts/refresh.py"]

[[events]]
on = "worktree.removed"
command = ["python3", "scripts/refresh.py"]

[[events]]
on = "tab.created"
command = ["python3", "scripts/refresh.py"]

[[events]]
on = "tab.closed"
command = ["python3", "scripts/refresh.py"]

[[events]]
on = "tab.renamed"
command = ["python3", "scripts/refresh.py"]

[[events]]
on = "tab.moved"
command = ["python3", "scripts/refresh.py"]

[[events]]
on = "pane.created"
command = ["python3", "scripts/refresh.py"]

[[events]]
on = "pane.closed"
command = ["python3", "scripts/refresh.py"]

[[events]]
on = "pane.moved"
command = ["python3", "scripts/refresh.py"]

[[events]]
on = "pane.exited"
command = ["python3", "scripts/refresh.py"]

[[events]]
on = "pane.agent_detected"
command = ["python3", "scripts/refresh.py"]

[[events]]
on = "pane.agent_status_changed"
command = ["python3", "scripts/refresh.py"]

[[events]]
on = "pane.focused"
command = ["python3", "scripts/refresh.py"]
